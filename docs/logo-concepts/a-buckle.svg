<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200">
  <!-- vintage paper plate -->
  <rect x="4" y="4" width="252" height="192" rx="16" fill="#F2EAD8"/>
  <rect x="7" y="7" width="246" height="186" rx="13" fill="none" stroke="#1b1712" stroke-width="3"/>
  <rect x="14" y="14" width="232" height="172" rx="9" fill="none" stroke="#1b1712" stroke-width="1.1"/>

  <!-- leather strap -->
  <rect x="22" y="78" width="156" height="44" rx="11" fill="#1b1712"/>
  <!-- stitching -->
  <g fill="#F2EAD8">
    <circle cx="36" cy="86" r="2.3"/><circle cx="49" cy="86" r="2.3"/><circle cx="62" cy="86" r="2.3"/><circle cx="75" cy="86" r="2.3"/><circle cx="88" cy="86" r="2.3"/><circle cx="101" cy="86" r="2.3"/><circle cx="114" cy="86" r="2.3"/><circle cx="127" cy="86" r="2.3"/><circle cx="140" cy="86" r="2.3"/><circle cx="153" cy="86" r="2.3"/>
    <circle cx="36" cy="114" r="2.3"/><circle cx="49" cy="114" r="2.3"/><circle cx="62" cy="114" r="2.3"/><circle cx="75" cy="114" r="2.3"/><circle cx="88" cy="114" r="2.3"/><circle cx="101" cy="114" r="2.3"/><circle cx="114" cy="114" r="2.3"/><circle cx="127" cy="114" r="2.3"/><circle cx="140" cy="114" r="2.3"/><circle cx="153" cy="114" r="2.3"/>
  </g>
  <!-- punch holes -->
  <g fill="#F2EAD8"><circle cx="70" cy="100" r="5.5"/><circle cx="96" cy="100" r="5.5"/><circle cx="122" cy="100" r="5.5"/></g>

  <!-- buckle frame -->
  <path d="M150 64 h74 a18 18 0 0 1 18 18 v56 a18 18 0 0 1 -18 18 h-74 a18 18 0 0 1 -18 -18 v-56 a18 18 0 0 1 18 -18 z
           M170 86 a8 8 0 0 0 -8 8 v32 a8 8 0 0 0 8 8 h18 v-56 z
           M198 86 v56 h18 a8 8 0 0 0 8 -8 v-32 a8 8 0 0 0 -8 -8 z"
        fill="#1b1712" fill-rule="evenodd"/>
  <!-- metal rim highlight -->
  <rect x="139" y="71" width="96" height="86" rx="13" fill="none" stroke="#F2EAD8" stroke-width="1.6"/>
  <!-- center bar -->
  <rect x="189" y="84" width="10" height="56" rx="3" fill="#1b1712"/>
  <!-- prong -->
  <polygon points="194,94 122,97.5 116,100 122,102.5 194,106" fill="#1b1712"/>
  <line x1="190" y1="96" x2="124" y2="99" stroke="#F2EAD8" stroke-width="1.1"/>

  <!-- stipple shading (engraving) -->
  <g fill="#1b1712">
    <circle cx="150" cy="160" r="1.5"/><circle cx="160" cy="164" r="1.5"/><circle cx="172" cy="161" r="1.5"/><circle cx="184" cy="165" r="1.5"/><circle cx="196" cy="162" r="1.5"/><circle cx="208" cy="166" r="1.5"/><circle cx="220" cy="162" r="1.5"/><circle cx="232" cy="159" r="1.5"/>
    <circle cx="156" cy="170" r="1.3"/><circle cx="178" cy="171" r="1.3"/><circle cx="200" cy="171" r="1.3"/><circle cx="222" cy="169" r="1.3"/>
    <circle cx="40" cy="134" r="1.3"/><circle cx="54" cy="138" r="1.3"/><circle cx="70" cy="136" r="1.3"/><circle cx="86" cy="139" r="1.3"/><circle cx="102" cy="136" r="1.3"/><circle cx="120" cy="138" r="1.3"/>
  </g>
  <g fill="#F2EAD8">
    <circle cx="148" cy="74" r="1.3"/><circle cx="160" cy="72" r="1.3"/><circle cx="172" cy="73" r="1.3"/><circle cx="184" cy="72" r="1.3"/>
  </g>
</svg>
