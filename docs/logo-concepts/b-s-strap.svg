    <circle cx="150" cy="150" r="1.5"/><circle cx="160" cy="156" r="1.5"/><circle cx="150" cy="164" r="1.3"/><circle cx="164" cy="166" r="1.3"/><circle cx="138" cy="166" r="1.2"/>
