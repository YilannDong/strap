<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" fill="none" stroke="#1a1714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect width="240" height="240" fill="#F6F0E2" stroke="none"/>

  <!-- vest body: two front panels with a center gap -->
  <path d="M86 40 L120 60 L154 40 C176 48 184 70 184 96 L184 196 C184 204 178 210 170 210 L128 210 L120 150 L112 210 L70 210 C62 210 56 204 56 196 L56 96 C56 70 64 48 86 40 Z" fill="#F6F0E2" stroke-width="2.4"/>
  <!-- shoulder seams -->
  <path d="M86 40 L96 70 M154 40 L144 70"/>
  <!-- center placket / zipper -->
  <g stroke-width="1.5" stroke-dasharray="2 8"><path d="M120 60 L120 150"/></g>

  <!-- horizontal chest strap + buckle -->
  <path d="M64 104 H176" stroke-width="9" stroke="#1a1714"/>
  <path d="M64 104 H176" stroke-width="5" stroke="#F6F0E2"/>
  <rect x="104" y="93" width="32" height="22" rx="6" fill="#F6F0E2" stroke-width="2.2"/>
  <rect x="111" y="100" width="18" height="8" rx="3" fill="#fff"/>

  <!-- two utility pockets -->
  <rect x="72" y="140" width="40" height="44" rx="6" stroke-width="1.8"/>
  <rect x="128" y="140" width="40" height="44" rx="6" stroke-width="1.8"/>
  <path d="M72 152 H112 M128 152 H168" stroke-width="1.4"/>

  <!-- hatch shading on sides -->
  <g stroke-width="0.9"><path d="M168 70 l10 6 M166 80 l14 8 M170 60 l8 5 M62 70 l10 6 M64 80 l-2 1"/></g>

  <!-- stipple -->
  <g fill="#1a1714" stroke="none">
    <circle cx="62" cy="196" r="1.4"/><circle cx="70" cy="200" r="1.3"/><circle cx="170" cy="198" r="1.4"/><circle cx="178" cy="194" r="1.2"/>
    <circle cx="120" cy="196" r="1.2"/><circle cx="112" cy="200" r="1.1"/><circle cx="128" cy="200" r="1.1"/>
  </g>
</svg>
