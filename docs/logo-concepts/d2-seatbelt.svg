<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <g transform="rotate(35 100 100)" fill="none" stroke="#1a1714" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- webbing edges (full bleed across) -->
    <path d="M76 -8 V208 M124 -8 V208"/>
    <!-- weave -->
    <g stroke-width="1" stroke="#9a8f80"><path d="M88 -8 V208 M100 -8 V208 M112 -8 V208"/></g>
    <!-- stitching -->
    <g stroke-width="1.7" stroke-dasharray="2 9"><path d="M81 -8 V208 M119 -8 V208"/></g>

    <!-- buckle / latch plate -->
    <rect x="60" y="74" width="80" height="52" rx="13" fill="#ffffff" stroke-width="2.6"/>
    <rect x="67" y="81" width="66" height="38" rx="9" fill="none" stroke-width="1.1"/>
    <rect x="85" y="95" width="30" height="11" rx="5" fill="#ffffff" stroke-width="2"/>
    <!-- buckle shading -->
    <g stroke-width="1"><path d="M122 118 l12 -8 M116 122 l18 -12 M128 114 l8 -5"/></g>
  </g>

  <!-- stipple specks -->
  <g fill="#1a1714" stroke="none">
    <circle cx="150" cy="60" r="1.4"/><circle cx="158" cy="66" r="1.3"/><circle cx="148" cy="70" r="1.1"/>
    <circle cx="50" cy="140" r="1.4"/><circle cx="42" cy="134" r="1.3"/><circle cx="52" cy="148" r="1.1"/>
  </g>
</svg>
