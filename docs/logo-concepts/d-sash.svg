<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" fill="none" stroke="#1a1714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect width="240" height="240" fill="#F6F0E2" stroke="none"/>
  <!-- rounded "seat / body" plate -->
  <rect x="34" y="34" width="172" height="172" rx="40" stroke-width="2.4"/>

  <!-- diagonal seatbelt webbing across the body -->
  <g transform="rotate(34 120 120)">
    <!-- webbing edges -->
    <path d="M100 18 V222 M140 18 V222"/>
    <!-- weave -->
    <g stroke-width="0.9" stroke="#7a6f5e"><path d="M110 20 V220 M120 20 V220 M130 20 V220"/></g>
    <!-- stitching -->
    <g stroke-width="1.5" stroke-dasharray="2 9"><path d="M104 22 V218 M136 22 V218"/></g>

    <!-- latch buckle clicked in, mid-belt -->
    <rect x="84" y="104" width="72" height="44" rx="11" fill="#F6F0E2" stroke-width="2.2"/>
    <rect x="90" y="110" width="60" height="32" rx="7" fill="none" stroke-width="1"/>
    <rect x="106" y="120" width="28" height="11" rx="5" fill="#fff"/>
    <!-- buckle shading -->
    <g stroke-width="0.9"><path d="M138 138 l10 -7 M134 144 l16 -11"/></g>
  </g>

  <!-- stipple -->
  <g fill="#1a1714" stroke="none">
    <circle cx="54" cy="180" r="1.5"/><circle cx="62" cy="186" r="1.4"/><circle cx="70" cy="182" r="1.2"/><circle cx="58" cy="174" r="1.2"/>
    <circle cx="182" cy="64" r="1.5"/><circle cx="174" cy="58" r="1.3"/><circle cx="186" cy="72" r="1.2"/>
    <circle cx="176" cy="180" r="1.3"/><circle cx="184" cy="174" r="1.2"/>
  </g>
</svg>
