<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 480" width="1240" height="480" font-family="Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="1238" height="478" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <text x="36" y="46" font-size="20" font-weight="800" fill="#111827" letter-spacing="-0.3">Full example · Claude Code → Figma</text>
  <text x="36" y="70" font-size="14" fill="#6B7280">Build on-spec in code → push to Figma as instances bound to Variables, not detached rectangles.</text>

  <!-- ============ PANEL 1 · CODE ============ -->
  <rect x="36" y="92" width="356" height="316" rx="14" fill="#0F172A"/>
  <text x="58" y="122" font-size="13" font-weight="700" fill="#E2E8F0" font-family="ui-monospace, Menlo, monospace">Button.tsx · Button.css</text>
  <g font-family="ui-monospace, Menlo, monospace" font-size="12.5">
    <text x="58" y="154" fill="#CBD5E1">&lt;Button variant=<tspan fill="#60A5FA">"primary"</tspan>&gt;</text>
    <text x="58" y="176" fill="#CBD5E1">  Pay now</text>
    <text x="58" y="198" fill="#CBD5E1">&lt;/Button&gt;</text>
  </g>
  <line x1="58" y1="218" x2="370" y2="218" stroke="#1E293B" stroke-width="1.5"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="12.5">
    <text x="58" y="244" fill="#64748B">/* Button.css */</text>
    <text x="58" y="268" fill="#CBD5E1">background: <tspan fill="#60A5FA">var(--blue)</tspan>;</text>
    <text x="58" y="292" fill="#CBD5E1">border-radius: <tspan fill="#60A5FA">var(--radius-button)</tspan>;</text>
  </g>
  <text x="58" y="334" font-size="12.5" fill="#4ADE80" font-family="ui-monospace, Menlo, monospace">✓ on-spec — tokens + registry component</text>

  <!-- arrow 1 -->
  <line x1="398" y1="250" x2="438" y2="250" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="438,245 448,250 438,255" fill="#94A3B8"/>
  <text x="423" y="239" text-anchor="middle" font-size="10.5" fill="#2563EB" font-weight="700">use_figma</text>

  <!-- ============ PANEL 2 · MAPPING ============ -->
  <rect x="456" y="92" width="330" height="316" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="476" y="124" font-size="15" font-weight="700" fill="#111827">Strap maps it</text>
  <text x="476" y="146" font-size="12" fill="#6B7280" font-family="ui-monospace, Menlo, monospace">code  →  design</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="12.5">
    <!-- row 1 -->
    <text x="476" y="192" fill="#2563EB">var(--blue)</text>
    <text x="612" y="192" fill="#94A3B8">→</text>
    <text x="636" y="192" fill="#374151">color/blue</text>
    <!-- row 2 -->
    <text x="476" y="228" fill="#2563EB">--radius-button</text>
    <text x="612" y="228" fill="#94A3B8">→</text>
    <text x="636" y="228" fill="#374151">radius 12</text>
    <!-- row 3 -->
    <text x="476" y="264" fill="#2563EB">&lt;Button/&gt;</text>
    <text x="612" y="264" fill="#94A3B8">→</text>
    <text x="636" y="264" fill="#374151">instance</text>
  </g>
  <line x1="476" y1="288" x2="766" y2="288" stroke="#F1F5F9" stroke-width="1.5"/>
  <text x="476" y="316" font-size="12" fill="#6B7280">tokens become <tspan fill="#111827" font-weight="700">Figma Variables</tspan></text>
  <text x="476" y="338" font-size="12" fill="#6B7280">components become <tspan fill="#111827" font-weight="700">instances</tspan></text>

  <!-- arrow 2 -->
  <line x1="792" y1="250" x2="832" y2="250" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="832,245 842,250 832,255" fill="#94A3B8"/>
  <text x="816" y="239" text-anchor="middle" font-size="10.5" fill="#6B7280" font-weight="700">generate</text>

  <!-- ============ PANEL 3 · FIGMA ============ -->
  <rect x="850" y="92" width="354" height="316" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <path d="M850 106 a14 14 0 0 1 14 -14 h326 a14 14 0 0 1 14 14 v20 h-354 z" fill="#F1F5F9"/>
  <circle cx="870" cy="106" r="4" fill="#CBD5E1"/><circle cx="884" cy="106" r="4" fill="#CBD5E1"/><circle cx="898" cy="106" r="4" fill="#CBD5E1"/>
  <text x="1027" y="110" text-anchor="middle" font-size="12" fill="#64748B" font-weight="600">Figma · Checkout</text>

  <!-- the generated card -->
  <rect x="874" y="146" width="220" height="124" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="892" y="172" font-size="10.5" fill="#6B7280" font-weight="700" letter-spacing="0.06em">CHECKOUT</text>
  <text x="892" y="196" font-size="19" font-weight="800" fill="#111827">Total $48.00</text>
  <rect x="892" y="212" width="184" height="38" rx="10" fill="#2563EB"/>
  <text x="984" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Pay now</text>

  <!-- variables inspector -->
  <rect x="874" y="284" width="312" height="98" rx="10" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="890" y="305" font-size="10.5" fill="#6B7280" font-weight="700" letter-spacing="0.05em">FIGMA VARIABLES</text>
  <rect x="890" y="316" width="15" height="15" rx="4" fill="#2563EB"/>
  <text x="916" y="328" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">color/blue = #2563EB</text>
  <text x="890" y="356" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#16A34A">↳ bound to the button fill ✓</text>
  <text x="890" y="376" font-size="11.5" fill="#6B7280">change it → the button follows</text>
</svg>
