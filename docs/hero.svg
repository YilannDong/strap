<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" font-family="Helvetica, Arial, sans-serif">
  <!-- card -->
  <rect x="1" y="1" width="1198" height="418" rx="22" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- faint left rail, echoing the gallery -->
  <rect x="56" y="40" width="1.5" height="340" fill="#F1F5F9"/>

  <!-- wordmark: seatbelt mark + "strap" -->
  <g transform="translate(58,56) scale(0.46)">
    <g transform="rotate(35 100 100)" fill="none" stroke="#111827" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M76 18 V182 M124 18 V182"/>
      <path d="M76 18 H124 M76 182 H124" stroke-width="2.2"/>
      <g stroke-width="1.05" stroke="#9aa3ad"><path d="M88 20 V180 M100 20 V180 M112 20 V180"/></g>
      <g stroke-width="1.8" stroke-dasharray="2 9"><path d="M81 23 V177 M119 23 V177"/></g>
      <rect x="60" y="74" width="80" height="52" rx="13" fill="#FFFFFF" stroke-width="2.8"/>
      <rect x="67" y="81" width="66" height="38" rx="9" fill="none" stroke-width="1.2"/>
      <rect x="85" y="95" width="30" height="11" rx="5" fill="#FFFFFF" stroke-width="2.1"/>
      <g stroke-width="1.05"><path d="M122 118 l12 -8 M116 122 l18 -12"/></g>
    </g>
  </g>
  <text x="180" y="128" font-size="68" font-weight="800" letter-spacing="-2.5" fill="#111827">strap</text>

  <!-- tagline -->
  <text x="80" y="210" font-size="34" font-weight="700" fill="#111827" letter-spacing="-0.5">Keep AI on your</text>
  <text x="80" y="252" font-size="34" font-weight="700" fill="#111827" letter-spacing="-0.5">design system <tspan fill="#2563EB">rails</tspan>.</text>
  <rect x="80" y="266" width="186" height="3" rx="1.5" fill="#2563EB"/>

  <text x="80" y="318" font-size="18" font-weight="400" fill="#6B7280">Enforced, not suggested — the hook blocks off-spec</text>
  <text x="80" y="344" font-size="18" font-weight="400" fill="#6B7280">writes before they land. Claude Code + Figma.</text>

  <!-- terminal: the signature "blocked" moment -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect x="628" y="56" width="508" height="308" rx="16" fill="#0F172A"/>
    <circle cx="660" cy="90" r="5" fill="#EF4444"/>
    <circle cx="680" cy="90" r="5" fill="#FBBF24"/>
    <circle cx="700" cy="90" r="5" fill="#22C55E"/>
    <text x="724" y="95" font-size="14" fill="#64748B">strap check · PriceTag.css</text>
    <line x1="628" y1="116" x2="1136" y2="116" stroke="#1E293B" stroke-width="1.5"/>

    <text x="656" y="160" font-size="17" font-weight="700" fill="#F87171">⛔ blocked — 2 violations</text>

    <text x="656" y="206" font-size="16" fill="#CBD5E1">background:
      <tspan fill="#FCA5A5" text-decoration="line-through">#2D6CF0</tspan>
      <tspan fill="#64748B">→</tspan>
      <tspan fill="#60A5FA">var(--blue)</tspan>
    </text>
    <text x="656" y="242" font-size="16" fill="#CBD5E1">font-family:
      <tspan fill="#FCA5A5" text-decoration="line-through">Helvetica</tspan>
      <tspan fill="#64748B">→ off-system</tspan>
    </text>

    <text x="656" y="306" font-size="16" fill="#4ADE80">✓ bound to tokens · rails held</text>
  </g>
</svg>
