name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Turns Pages on automatically if it isn't already (no manual Settings toggle needed).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Assemble static site (gallery + the CSS it links)
        run: |
          mkdir -p _site/src/styles _site/src/components
          cp index.html _site/index.html
          cp favicon.svg _site/favicon.svg
          cp src/styles/tokens.css _site/src/styles/
          cp src/components/*.css _site/src/components/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
